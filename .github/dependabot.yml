version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    reviewers:
      - "mariobehling"
    security-updates: true
    groups:
      frontend:
        patterns:
          - "react*"
          - "react-dom"
          - "react-*"
          - "react-grid-layout"
          - "d3-*"
          - "three"
          - "jquery"
        update-types: ["minor", "patch"]
      devdeps:
        dependency-type: "development"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    reviewers:
      - "mariobehling"
    security-updates: true
    groups:
      core-python:
        patterns:
          - "numpy"
          - "scipy"
          - "requests"
          - "tornado"
          - "networkx"
          - "pillow*"
        update-types: ["minor", "patch"]
      devdeps:
        dependency-type: "development"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "mariobehling"
    security-updates: true
